<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" fill="none">
  <!-- Background -->
  <rect width="1200" height="780" fill="#0a0a0a"/>
  
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="780" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ededed" text-anchor="middle">Delta V ZHC Architecture (Simplified v1)</text>
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666" text-anchor="middle">Lean • Intel-First • Realistic Starting Point</text>

  <!-- === INTEL & RESEARCH CORE === -->
  <g>
    <rect x="250" y="80" width="700" height="90" rx="14" fill="#0f1f1f" stroke="#00f0ff" stroke-width="2.5"/>
    <text x="600" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#00f0ff" text-anchor="middle">INTEL &amp; RESEARCH CORE</text>
    <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#aaa" text-anchor="middle">RSS • OSINT • Research • Dashboards</text>
    <text x="600" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">Foundational Layer</text>
  </g>

  <!-- Arrow -->
  <line x1="600" y1="170" x2="600" y2="195" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4 2"/>

  <!-- === CHIEF OPERATOR === -->
  <g>
    <rect x="425" y="195" width="350" height="60" rx="12" fill="#111" stroke="#00f0ff" stroke-width="2"/>
    <text x="600" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#00f0ff" text-anchor="middle">Chief Operator</text>
    <text x="600" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">Strategy • Prioritization • Oversight</text>
  </g>

  <!-- Horizontal Line -->
  <line x1="200" y1="270" x2="1000" y2="270" stroke="#333" stroke-width="2"/>

  <!-- === OPERATIONAL UNITS === -->

  <!-- AI Operations -->
  <g>
    <line x1="300" y1="270" x2="300" y2="305" stroke="#444" stroke-width="2"/>
    <rect x="150" y="305" width="300" height="75" rx="12" fill="#111" stroke="#00f0ff" stroke-width="1.5"/>
    <text x="300" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ededed" text-anchor="middle">AI Operations</text>
    <text x="300" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">Multi-Agent Systems • Inference • Retainers</text>
  </g>

  <!-- Web3 Operations -->
  <g>
    <line x1="600" y1="270" x2="600" y2="305" stroke="#444" stroke-width="2"/>
    <rect x="450" y="305" width="300" height="75" rx="12" fill="#111" stroke="#00f0ff" stroke-width="1.5"/>
    <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ededed" text-anchor="middle">Web3 Operations</text>
    <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">Architecture • Growth • Intelligence</text>
  </g>

  <!-- Forge -->
  <g>
    <line x1="900" y1="270" x2="900" y2="305" stroke="#444" stroke-width="2"/>
    <rect x="750" y="305" width="300" height="75" rx="12" fill="#111" stroke="#00f0ff" stroke-width="1.5"/>
    <text x="900" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ededed" text-anchor="middle">Forge (Education)</text>
    <text x="900" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">Upskilling • Curriculums • Tutorials</text>
  </g>

  <!-- === SUBAGENT LAYER (Clear Box) === -->
  <rect x="80" y="410" width="1040" height="180" rx="14" fill="#0f0f0f" stroke="#222" stroke-width="1.5"/>
  <text x="600" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#00f0ff" text-anchor="middle">SUBAGENT LAYER (7 Total — Lean Starting Point)</text>

  <!-- AI Subagents -->
  <g>
    <text x="300" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">AI Subagents</text>
    <rect x="200" y="478" width="100" height="36" rx="7" fill="#1a1a1a" stroke="#444"/>
    <text x="250" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Agent Builder</text>
    
    <rect x="310" y="478" width="100" height="36" rx="7" fill="#1a1a1a" stroke="#444"/>
    <text x="360" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Inference Agent</text>
  </g>

  <!-- Web3 Subagents -->
  <g>
    <text x="600" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">Web3 Subagents</text>
    <rect x="500" y="478" width="100" height="36" rx="7" fill="#1a1a1a" stroke="#444"/>
    <text x="550" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Growth Agent</text>
    
    <rect x="610" y="478" width="100" height="36" rx="7" fill="#1a1a1a" stroke="#444"/>
    <text x="660" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">On-chain Analyst</text>
  </g>

  <!-- Forge Subagents -->
  <g>
    <text x="900" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="middle">Forge Subagents</text>
    <rect x="800" y="478" width="100" height="36" rx="7" fill="#1a1a1a" stroke="#444"/>
    <text x="850" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Content Agent</text>
    
    <rect x="910" y="478" width="100" height="36" rx="7" fill="#112211" stroke="#00f0ff"/>
    <text x="960" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle">Professor Agent</text>
  </g>

  <!-- Research Subagents -->
  <g>
    <text x="300" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle">Research Subagents</text>
    <rect x="200" y="555" width="100" height="36" rx="7" fill="#112211" stroke="#00f0ff"/>
    <text x="250" y="577" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle">Research Agent</text>
    
    <rect x="310" y="555" width="100" height="36" rx="7" fill="#112211" stroke="#00f0ff"/>
    <text x="360" y="577" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle">Signal Curator</text>
  </g>

  <!-- Footer -->
  <text x="600" y="630" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555" text-anchor="middle">Main Agent = Chief Operator  •  Subagents = Specialized Execution Units (7 total)</text>
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#444" text-anchor="middle">Intel &amp; Research Core = Foundational Layer  •  Realistic starting point for high autonomy</text>
</svg>