<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IntelHub — Delta V</title>
<link rel="icon" href="/website-private/favicon.ico"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ededed;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.intelhub{max-width:1440px;margin:0 auto;padding:40px 32px}
.intelhub h1{font-size:42px;font-weight:700;letter-spacing:-1.5px;background:linear-gradient(90deg,#00f0ff,#a855f7,#f59e0b,#C2410C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.intelhub p{color:rgba(237,237,237,.3);margin-top:6px;font-size:15px}
.status{display:flex;gap:8px;margin-top:16px;font-size:12px;color:rgba(237,237,237,.2)}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(52,211,153,.6)}
</style>
</head>
<body>
<div class="intelhub">
  <h1>IntelHub</h1>
  <p>Live threat surface · Market intel · Signal triage</p>
  <div class="status"><span class="dot"></span> Loading data...</div>
</div>
<script>
(async function(){
  const d=document.querySelector('.intelhub');
  const s=document.createElement('div');
  s.style.cssText='margin-top:24px;color:rgba(237,237,237,.5);font-size:14px';
  s.textContent='Pulse feed loading...';
  d.appendChild(s);
  try {
    const r=await fetch('/website-private/data/raw-items.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!Array.isArray(j))throw new Error('unexpected format');
    const ul=document.createElement('div');
    ul.style.cssText='margin-top:20px;display:flex;flex-direction:column;gap:8px';
    j.slice(0,20).forEach(i=>{
      const a=document.createElement('a');
      a.href=i.link||'#';
      a.target='_blank';
      a.style.cssText='display:block;padding:12px 16px;border:1px solid #222;border-radius:12px;background:rgba(255,255,255,.01);text-decoration:none;color:rgba(237,237,237,.7);font-size:13px;transition:all .2s';
      a.onmouseover=()=>{a.style.borderColor='#333';a.style.background='rgba(255,255,255,.03)'};
      a.onmouseout=()=>{a.style.borderColor='#222';a.style.background='rgba(255,255,255,.01)'};
      a.innerHTML=`<span style="color:rgba(237,237,237,.4)">${i.source||'?'}</span> ${(i.title||'').substring(0,120)}`;
      ul.appendChild(a);
    });
    const old=d.querySelector('.pulse-status');
    if(old)old.remove();
    d.appendChild(ul);
    document.querySelector('.status').innerHTML='<span class="dot" style="background:#34d399;box-shadow:0 0 10px rgba(52,211,153,.4)"></span> Live';
  } catch(e){
    document.querySelector('.status').innerHTML='<span style="color:#ef4444">●</span> Error loading: '+e.message;
  }
})();
</script>
</body>
</html>
