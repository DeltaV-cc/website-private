<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <!-- Background -->
  <rect width="1200" height="700" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="700" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#ededed" text-anchor="middle">Hermes + Qwen 3.6 Local AI Stack</text>
  <text x="600" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#00f0ff" text-anchor="middle">on NVIDIA DGX Spark</text>

  <!-- Layer 1: Hardware -->
  <g>
    <rect x="100" y="130" width="1000" height="130" rx="12" fill="#111" stroke="#333" stroke-width="2"/>
    <text x="120" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#00f0ff">HARDWARE LAYER</text>
    
    <rect x="140" y="185" width="280" height="55" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="160" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">NVIDIA DGX Spark</text>
    <text x="160" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">128GB Unified Memory • 1 Petaflop</text>
    
    <rect x="460" y="185" width="280" height="55" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="480" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">24/7 Local Operation</text>
    <text x="480" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Purpose-built for agent workloads</text>
    
    <rect x="780" y="185" width="280" height="55" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="800" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">Massive Context Windows</text>
    <text x="800" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Multi-agent + long-running tasks</text>
  </g>

  <!-- Arrow down -->
  <path d="M 600 270 L 600 295" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="600,295 594,285 606,285" fill="#00f0ff"/>

  <!-- Layer 2: Model -->
  <g>
    <rect x="100" y="310" width="1000" height="130" rx="12" fill="#111" stroke="#333" stroke-width="2"/>
    <text x="120" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#00f0ff">MODEL LAYER</text>
    
    <rect x="140" y="365" width="280" height="55" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="160" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">Qwen 3.6 (Alibaba)</text>
    <text x="160" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">35B Full / 27B Quantized • ~20GB VRAM</text>
    
    <rect x="460" y="365" width="280" height="55" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="480" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">Strong Reasoning</text>
    <text x="480" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Excellent tool-use &amp; coding</text>
    
    <rect x="780" y="365" width="280" height="55" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="800" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">Fully Open-Weight</text>
    <text x="800" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">No external dependencies</text>
  </g>

  <!-- Arrow down -->
  <path d="M 600 450 L 600 475" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="600,475 594,465 606,465" fill="#00f0ff"/>

  <!-- Layer 3: Framework -->
  <g>
    <rect x="100" y="490" width="1000" height="170" rx="12" fill="#111" stroke="#333" stroke-width="2"/>
    <text x="120" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#00f0ff">HERMES AGENT FRAMEWORK</text>
    
    <!-- Self-evolving loop -->
    <rect x="140" y="545" width="420" height="95" rx="8" fill="#1a1a1a" stroke="#00f0ff" stroke-width="1.5"/>
    <text x="160" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">Self-Evolving Loop</text>
    <text x="160" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Observe → Reflect → Tool Use → Code Gen → Deploy</text>
    <text x="160" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Autonomous skill improvement • No human intervention</text>
    
    <!-- 3-Layer Memory -->
    <rect x="600" y="545" width="220" height="95" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="620" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">3-Layer Memory</text>
    <text x="620" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Short-term • Long-term</text>
    <text x="620" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Skills + Retrieval (depth 20)</text>
    
    <!-- OpenShell -->
    <rect x="860" y="545" width="200" height="95" rx="8" fill="#1a1a1a" stroke="#444"/>
    <text x="880" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ededed">NVIDIA OpenShell</text>
    <text x="880" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Secure sandbox execution</text>
    <text x="880" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Zero external data sharing</text>
  </g>

  <!-- Footer -->
  <text x="600" y="685" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555" text-anchor="middle">Full local execution • Self-improving capabilities • Sovereign AI stack</text>
</svg>