<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IntelHub — Delta V</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ededed;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.header{max-width:1440px;width:100%;padding:40px 32px 0}
.header h1{font-size:42px;font-weight:700;letter-spacing:-1.5px;background:linear-gradient(90deg,#00f0ff,#a855f7,#f59e0b,#C2410C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:rgba(237,237,237,.3);margin-top:6px;font-size:15px}
.status{display:flex;gap:8px;margin-top:16px;font-size:12px;color:rgba(237,237,237,.2);align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(52,211,153,.6);display:inline-block}
.content{max-width:1440px;width:100%;padding:32px;display:flex;flex-direction:column;gap:8px}
.item{display:block;padding:12px 16px;border:1px solid #222;border-radius:12px;background:rgba(255,255,255,.01);text-decoration:none;color:rgba(237,237,237,.7);font-size:13px;transition:all .2s}
.item:hover{border-color:#333;background:rgba(255,255,255,.03)}
.src{color:rgba(237,237,237,.4);font-size:11px}
</style>
</head>
<body>
<div class="header">
  <h1>IntelHub</h1>
  <p>Live threat surface · Market intel · Signal triage</p>
  <div class="status" id="status"><span class="dot"></span> Loading...</div>
</div>
<div class="content" id="feed"></div>
<script>
(async function(){
  try {
    const r=await fetch('/website-private/data/raw-items.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!Array.isArray(j))throw new Error('bad format');
    document.getElementById('status').innerHTML='<span class="dot" style="background:#34d399;box-shadow:0 0 10px rgba(52,211,153,.4)"></span> Live — '+j.length+' signals';
    const feed=document.getElementById('feed');
    j.slice(0,30).forEach(i=>{
      const a=document.createElement('a');
      a.href=i.link||'#';a.target='_blank';a.className='item';
      a.innerHTML='<span class="src">'+(i.source||'?')+'</span> '+(i.title||'').substring(0,140);
      feed.appendChild(a);
    });
  } catch(e){
    document.getElementById('status').innerHTML='<span style="color:#ef4444">●</span> Error: '+e.message;
  }
})();
</script>
</body>
</html>
